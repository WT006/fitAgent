spring:
  application:
    name: fit-ai-agent
  profiles:
    active: local
  ai:
    chat:
      options:
        model: qwen-plus
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
server:
  port: 8122
  servlet:
    context-path: /api
# springdoc-openapi????
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: org.example.fitaiagent.controller
# knife4j???????????????
knife4j:
  enable: true
  setting:
    language: zh_cn
